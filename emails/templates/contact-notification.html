<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <title>New contact form message</title>

  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->

  <!-- Figtree for clients that load web fonts (Apple Mail, iOS Mail); everything else falls back to the system sans stack. -->
  <!--[if !mso]><!-->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!--<![endif]-->

  <style type="text/css">
    /* ---------- Client resets ---------- */
    html, body { margin: 0 !important; padding: 0 !important; height: 100% !important; width: 100% !important; }
    * { -ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt !important; mso-table-rspace: 0pt !important; border-collapse: collapse !important; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    a { text-decoration: none; }
    /* Stop Apple/iOS auto-linking dates, addresses, etc. from being restyled. */
    a[x-apple-data-detectors], .unstyle-auto-detect a {
      color: inherit !important; text-decoration: none !important; font-size: inherit !important;
      font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important;
    }
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: local('Figtree');
    }

    /* ---------- Fluid, mobile-first tweaks ---------- */
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; margin: 0 auto !important; }
      .p-fluid { padding-left: 24px !important; padding-right: 24px !important; }
      .p-fluid-header { padding: 28px 24px !important; }
      .h1-fluid { font-size: 22px !important; line-height: 29px !important; }
      .btn-fluid { width: 100% !important; }
      .btn-fluid a { display: block !important; width: 100% !important; box-sizing: border-box !important; text-align: center !important; }
      .stack { display: block !important; width: 100% !important; }
    }

    /* ---------- Dark mode (clients that honour prefers-color-scheme) ---------- */
    @media (prefers-color-scheme: dark) {
      body, .bg-page { background-color: #0a0d13 !important; }
      .card { background-color: #16202c !important; border-color: #24313f !important; }
      .footer { background-color: #121a24 !important; border-color: #24313f !important; }
      .panel { background-color: #121a24 !important; border-color: #24313f !important; }
      .t-heading { color: #f2f6f8 !important; }
      .t-body { color: #d6e3ec !important; }
      .t-muted { color: #b3c3cf !important; }
      .t-subtle { color: #93a2ad !important; }
      .link { color: #6fc79a !important; }
    }
    /* Outlook.com dark-mode hooks. */
    [data-ogsc] body, [data-ogsc] .bg-page { background-color: #0a0d13 !important; }
    [data-ogsc] .card { background-color: #16202c !important; }
    [data-ogsc] .footer { background-color: #121a24 !important; }
    [data-ogsc] .panel { background-color: #121a24 !important; }
    [data-ogsc] .t-heading { color: #f2f6f8 !important; }
    [data-ogsc] .t-body { color: #d6e3ec !important; }
    [data-ogsc] .t-muted { color: #b3c3cf !important; }
    [data-ogsc] .t-subtle { color: #93a2ad !important; }
    [data-ogsc] .link { color: #6fc79a !important; }
  </style>
</head>

<body style="margin:0; padding:0; width:100%; background-color:#f6f7f9;">
  <!-- Preheader: the inbox preview line. -->
  <div style="display:none; overflow:hidden; line-height:1px; opacity:0; max-height:0; max-width:0; mso-hide:all; font-size:1px; color:#f6f7f9;">
    New contact form message from [[NAME]] &lt;[[EMAIL]]&gt;
    &#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;
  </div>

  <!-- Page background -->
  <table role="presentation" class="bg-page" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f6f7f9;">
    <tr>
      <td align="center" style="padding:24px 12px;">

        <!--[if mso]>
        <table role="presentation" align="center" cellpadding="0" cellspacing="0" border="0" width="600"><tr><td>
        <![endif]-->

        <!-- Centered container -->
        <table role="presentation" class="email-container" cellpadding="0" cellspacing="0" border="0" width="600" style="width:600px; max-width:600px; margin:0 auto;">

          <!-- ===================== Header band (Rogue Oak banner navy) ===================== -->
          <tr>
            <td class="p-fluid-header" align="left" bgcolor="#1a2533" style="background-color:#1a2533; padding:32px 40px; border-radius:16px 16px 0 0;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td valign="middle" width="52" style="width:52px; padding-right:16px;">
                    <img src="https://rogueoak.com/rogueoak-avatar.png" width="52" height="52" alt="Rogue Oak" style="display:block; width:52px; height:52px; border-radius:12px; border:2px solid #d2a463;" />
                  </td>
                  <td valign="middle">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:15px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#eef3f8;">
                          Rogue Oak
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ===================== Card body ===================== -->
          <tr>
            <td class="card p-fluid" bgcolor="#ffffff" style="background-color:#ffffff; padding:32px 40px 40px; border-left:1px solid #dce0e7; border-right:1px solid #dce0e7;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">

                <!-- Eyebrow -->
                <tr>
                  <td style="font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#9c6a2c;">
                    New contact message
                  </td>
                </tr>

                <!-- Sender name -->
                <tr>
                  <td class="t-heading h1-fluid" style="padding-top:12px; font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:24px; line-height:31px; font-weight:700; color:#1f2733;">
                    [[NAME]]
                  </td>
                </tr>

                <!-- Sender email (mailto) + received date -->
                <tr>
                  <td style="padding-top:6px; font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:15px; line-height:22px;">
                    <a class="link" href="mailto:[[EMAIL]]" style="color:#2f6d4f; text-decoration:none; font-weight:600;">[[EMAIL]]</a>
                  </td>
                </tr>
                <tr>
                  <td class="t-subtle" style="padding-top:4px; font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; line-height:20px; color:#717e90;">
                    Received [[DATE]]
                  </td>
                </tr>

                <!-- Message label -->
                <tr>
                  <td style="padding-top:24px; font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#8a94a3;">
                    Message
                  </td>
                </tr>

                <!-- Message body panel. [[MESSAGE]] is HTML-escaped server-side; newlines become <br>. -->
                <tr>
                  <td style="padding-top:10px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" class="panel" bgcolor="#f6f7f9" style="background-color:#f6f7f9; border:1px solid #e3e7ee; border-radius:12px;">
                      <tr>
                        <td class="t-body" style="padding:20px 22px; font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:16px; line-height:26px; color:#39414c;">
                          [[MESSAGE]]
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- Reply button (bulletproof) - opens a reply to the sender. -->
                <tr>
                  <td align="center" style="padding-top:32px;">
                    <table role="presentation" class="btn-fluid" cellpadding="0" cellspacing="0" border="0" align="center">
                      <tr>
                        <td align="center" bgcolor="#2f6d4f" style="border-radius:8px;">
                          <!--[if mso]>
                          <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="mailto:[[EMAIL]]" style="height:50px;v-text-anchor:middle;width:200px;" arcsize="16%" strokecolor="#2f6d4f" fillcolor="#2f6d4f">
                            <w:anchorlock/>
                            <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">Reply &rarr;</center>
                          </v:roundrect>
                          <![endif]-->
                          <!--[if !mso]><!-->
                          <a href="mailto:[[EMAIL]]" target="_blank" style="display:inline-block; padding:15px 30px; font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:16px; font-weight:600; line-height:20px; color:#ffffff; background-color:#2f6d4f; border-radius:8px;">
                            Reply &rarr;
                          </a>
                          <!--<![endif]-->
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

          <!-- ===================== Footer ===================== -->
          <tr>
            <td class="footer p-fluid" bgcolor="#f0f2f5" style="background-color:#f0f2f5; padding:24px 40px; border:1px solid #dce0e7; border-top:0; border-radius:0 0 16px 16px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" class="t-subtle" style="font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; line-height:20px; color:#717e90;">
                    Sent from the contact form at
                    <a class="link" href="https://rogueoak.com/contact" target="_blank" style="color:#2f6d4f; text-decoration:none;">rogueoak.com</a>.
                    Just reply to reach [[NAME]] directly.
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>

        <!--[if mso]>
        </td></tr></table>
        <![endif]-->

      </td>
    </tr>
  </table>
</body>
</html>
