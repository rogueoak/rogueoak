<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Branch out">
  <defs>
    <linearGradient id="bo-spark" gradientUnits="userSpaceOnUse" x1="110" y1="400" x2="400" y2="110">
      <stop offset="0"    stop-color="#FBBF24"/>
      <stop offset="0.5"  stop-color="#EC4899"/>
      <stop offset="1"    stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="bo-bg" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0" stop-color="#221836"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="bo-glow" cx="0.5" cy="0.48" r="0.5">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bo-bg)"/>
  <circle cx="256" cy="248" r="210" fill="url(#bo-glow)"/>
  <g stroke-linecap="round" fill="none" stroke="url(#bo-spark)">
    <g stroke-width="16" opacity="0.16">
      <path d="M256 410 L256 300"/>
      <path d="M256 300 L160 236"/> <path d="M256 300 L352 236"/> <path d="M256 300 L256 180"/>
      <path d="M160 236 L96 168"/>  <path d="M160 236 L176 150"/>
      <path d="M352 236 L416 168"/> <path d="M352 236 L336 150"/>
      <path d="M256 180 L208 104"/> <path d="M256 180 L304 104"/>
    </g>
    <g stroke-width="7">
      <path d="M256 410 L256 300"/>
      <path d="M256 300 L160 236"/> <path d="M256 300 L352 236"/> <path d="M256 300 L256 180"/>
      <path d="M160 236 L96 168"/>  <path d="M160 236 L176 150"/>
      <path d="M352 236 L416 168"/> <path d="M352 236 L336 150"/>
      <path d="M256 180 L208 104"/> <path d="M256 180 L304 104"/>
    </g>
  </g>
  <g>
    <!-- leaf-node halos -->
    <g opacity="0.20">
      <circle cx="96"  cy="168" r="22" fill="#A78BFA"/>
      <circle cx="176" cy="150" r="22" fill="#F472B6"/>
      <circle cx="416" cy="168" r="22" fill="#22D3EE"/>
      <circle cx="336" cy="150" r="22" fill="#4ADE80"/>
      <circle cx="208" cy="104" r="22" fill="#FDE047"/>
      <circle cx="304" cy="104" r="22" fill="#FB7185"/>
      <circle cx="256" cy="410" r="20" fill="#d2a463"/>
    </g>
    <!-- inner junction nodes -->
    <g fill="#c9d2da">
      <circle cx="160" cy="236" r="6"/> <circle cx="352" cy="236" r="6"/> <circle cx="256" cy="180" r="6"/>
    </g>
    <!-- leaf-node cores -->
    <circle cx="96"  cy="168" r="13" fill="#A78BFA"/>
    <circle cx="176" cy="150" r="13" fill="#F472B6"/>
    <circle cx="416" cy="168" r="13" fill="#22D3EE"/>
    <circle cx="336" cy="150" r="13" fill="#4ADE80"/>
    <circle cx="208" cy="104" r="13" fill="#FDE047"/>
    <circle cx="304" cy="104" r="13" fill="#FB7185"/>
    <!-- highlights -->
    <g fill="#ffffff" opacity="0.55">
      <circle cx="92"  cy="164" r="5"/> <circle cx="172" cy="146" r="5"/>
      <circle cx="412" cy="164" r="5"/> <circle cx="332" cy="146" r="5"/>
      <circle cx="204" cy="100" r="5"/> <circle cx="300" cy="100" r="5"/>
    </g>
    <!-- gold root node -->
    <circle cx="256" cy="410" r="11" fill="#d2a463"/>
  </g>
</svg>
