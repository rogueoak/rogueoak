<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150" role="img" aria-label="Thought Stream - hands-free dictation for iPhone and CarPlay">
  <defs>
    <!-- River Mist wave: bright at the peaks, deeper at the base (matches the app icon) -->
    <linearGradient id="tsWave" gradientUnits="userSpaceOnUse" x1="68" y1="49" x2="68" y2="101">
      <stop offset="0"    stop-color="#9DBBBF"/>
      <stop offset="0.55" stop-color="#6F979E"/>
      <stop offset="1"    stop-color="#4E7882"/>
    </linearGradient>
    <linearGradient id="tsH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6F979E"/>
      <stop offset="1" stop-color="#9DBBBF"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161d27"/>
      <stop offset="1" stop-color="#0f141c"/>
    </linearGradient>
    <radialGradient id="tsGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6F979E" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#6F979E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- panel -->
  <rect x="0.5" y="0.5" width="519" height="149" rx="18" fill="none"/>

  <!-- glow behind the mark -->
  <circle cx="68" cy="75" r="60" fill="url(#tsGlow)"/>

  <!-- product tile -->
  <rect x="26" y="33" width="84" height="84" rx="20" fill="url(#tile)" stroke="#262e39"/>

  <!-- mark: a voice soundwave riding a quiet stream, node-graph style -->
  <g>
    <!-- the stream the sound rides on -->
    <path d="M44 75 C 54 70, 62 80, 68 75 C 74 70, 82 80, 92 75"
          fill="none" stroke="url(#tsWave)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

    <!-- soundwave bars, irregular like a real voice -->
    <g stroke="url(#tsWave)" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M46 63 L46 87"/>
      <path d="M57 53 L57 97"/>
      <path d="M68 59 L68 91"/>
      <path d="M79 49 L79 101"/>
      <path d="M90 61 L90 89"/>
    </g>

    <!-- bright top node caps -->
    <g fill="#eaf1f4">
      <circle cx="46" cy="63" r="3"/>
      <circle cx="57" cy="53" r="3.2"/>
      <circle cx="68" cy="59" r="3"/>
      <circle cx="90" cy="61" r="3"/>
    </g>

    <!-- live source: gold spark on the tallest peak (the family tie to the Rogue Oak avatar) -->
    <circle cx="79" cy="49" r="7" fill="#d2a463" opacity="0.2"/>
    <circle cx="79" cy="49" r="4" fill="#d2a463"/>
  </g>

  <!-- wordmark -->
  <text x="130" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="650" letter-spacing="0.4" fill="#e6edf3">Thought Stream</text>
  <rect x="132" y="93" width="150" height="2.5" rx="1.25" fill="url(#tsH)" opacity="0.85"/>
  <text x="133" y="116" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13.5" font-weight="500" letter-spacing="0.2" fill="#7d8896">hands-free dictation for iPhone and CarPlay</text>
</svg>
