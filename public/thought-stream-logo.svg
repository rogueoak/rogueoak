<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Thought Stream">
  <defs>
    <linearGradient id="ts-wave" gradientUnits="userSpaceOnUse" x1="512" y1="250" x2="512" y2="800">
      <stop offset="0"   stop-color="#9DBBBF"/>
      <stop offset="0.5" stop-color="#517E88"/>
      <stop offset="1"   stop-color="#35606B"/>
    </linearGradient>
    <radialGradient id="ts-bg" cx="0.5" cy="0.44" r="0.78">
      <stop offset="0" stop-color="#1B2E32"/>
      <stop offset="1" stop-color="#0B1315"/>
    </radialGradient>
    <radialGradient id="ts-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6F979E" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6F979E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#ts-bg)"/>
  <circle cx="512" cy="512" r="410" fill="url(#ts-glow)"/>

  <!-- the stream the sound rides on -->
  <path d="M228 512 C 324 484 386 540 512 512 C 632 486 700 540 796 512"
        fill="none" stroke="url(#ts-wave)" stroke-width="9" stroke-linecap="round" opacity="0.45"/>

  <!-- soundwave bars, irregular like a real voice, node-graph style -->
  <g fill="none" stroke="url(#ts-wave)" stroke-linecap="round">
    <!-- glow pass -->
    <g stroke-width="50" opacity="0.14">
      <path d="M256 442 L256 582"/> <path d="M320 362 L320 662"/>
      <path d="M384 416 L384 608"/> <path d="M448 302 L448 722"/>
      <path d="M512 382 L512 642"/> <path d="M576 277 L576 747"/>
      <path d="M640 422 L640 602"/> <path d="M704 342 L704 682"/>
      <path d="M768 452 L768 572"/>
    </g>
    <!-- crisp pass -->
    <g stroke-width="28">
      <path d="M256 442 L256 582"/> <path d="M320 362 L320 662"/>
      <path d="M384 416 L384 608"/> <path d="M448 302 L448 722"/>
      <path d="M512 382 L512 642"/> <path d="M576 277 L576 747"/>
      <path d="M640 422 L640 602"/> <path d="M704 342 L704 682"/>
      <path d="M768 452 L768 572"/>
    </g>
  </g>

  <!-- node caps -->
  <g>
    <!-- halos on the tallest peaks -->
    <g fill="#6F979E" opacity="0.18">
      <circle cx="576" cy="277" r="30"/> <circle cx="448" cy="302" r="26"/>
      <circle cx="704" cy="342" r="22"/>
    </g>
    <!-- bright top nodes -->
    <g fill="#EAF1F4">
      <circle cx="256" cy="442" r="12"/> <circle cx="320" cy="362" r="14"/>
      <circle cx="384" cy="416" r="12"/> <circle cx="448" cy="302" r="15"/>
      <circle cx="512" cy="382" r="13"/> <circle cx="640" cy="422" r="12"/>
      <circle cx="704" cy="342" r="14"/> <circle cx="768" cy="452" r="11"/>
    </g>
    <!-- subtle bottom nodes -->
    <g fill="#C4D6D8" opacity="0.85">
      <circle cx="256" cy="582" r="9"/>  <circle cx="320" cy="662" r="10"/>
      <circle cx="384" cy="608" r="9"/>  <circle cx="448" cy="722" r="11"/>
      <circle cx="512" cy="642" r="10"/> <circle cx="576" cy="747" r="11"/>
      <circle cx="640" cy="602" r="9"/>  <circle cx="704" cy="682" r="10"/>
      <circle cx="768" cy="572" r="9"/>
    </g>
    <!-- live source: gold spark on the tallest peak -->
    <circle cx="576" cy="277" r="34" fill="#d2a463" opacity="0.22"/>
    <circle cx="576" cy="277" r="19" fill="#d2a463"/>
  </g>
</svg>
