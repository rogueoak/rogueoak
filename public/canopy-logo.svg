<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150" role="img" aria-label="Canopy: the rogueoak design system">
  <defs>
    <linearGradient id="canopyG" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#C2873B"/>
      <stop offset="0.55" stop-color="#828F46"/>
      <stop offset="1" stop-color="#9DA95C"/>
    </linearGradient>
    <linearGradient id="canopyH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2873B"/>
      <stop offset="1" stop-color="#828F46"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161d27"/>
      <stop offset="1" stop-color="#0f141c"/>
    </linearGradient>
    <radialGradient id="canopyGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#828F46" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#828F46" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- panel -->
  <rect x="0.5" y="0.5" width="519" height="149" rx="18" fill="#0d1117" stroke="#1b2129"/>

  <!-- glow behind the mark -->
  <circle cx="68" cy="75" r="62" fill="url(#canopyGlow)"/>

  <!-- product tile -->
  <rect x="26" y="33" width="84" height="84" rx="20" fill="url(#tile)" stroke="#262e39"/>

  <!-- mark: a layered canopy over a trunk (the foliage layers echo the atomic layers) -->
  <g fill="none" stroke="url(#canopyG)" stroke-linecap="round" stroke-linejoin="round">
    <!-- soft glow pass -->
    <g stroke-width="7" opacity="0.16">
      <path d="M68 102 L68 88"/>
      <path d="M44 92 Q68 56 92 92"/>
      <path d="M50 80 Q68 48 86 80"/>
      <path d="M56 70 Q68 40 80 70"/>
    </g>
    <!-- crisp pass -->
    <g stroke-width="3.4">
      <path d="M68 102 L68 88"/>
      <path d="M44 92 Q68 56 92 92"/>
      <path d="M50 80 Q68 48 86 80"/>
      <path d="M56 70 Q68 40 80 70"/>
    </g>
  </g>

  <!-- apex node -->
  <circle cx="68" cy="52" r="9" fill="#828F46" opacity="0.18"/>
  <circle cx="68" cy="52" r="4.5" fill="#E7EBCF"/>

  <!-- wordmark -->
  <text x="130" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="650" letter-spacing="0.4" fill="#e6edf3">Canopy</text>
  <rect x="132" y="93" width="120" height="2.5" rx="1.25" fill="url(#canopyH)" opacity="0.85"/>
  <text x="133" y="116" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13.5" font-weight="500" letter-spacing="0.2" fill="#7d8896">the rogueoak design system</text>
</svg>
