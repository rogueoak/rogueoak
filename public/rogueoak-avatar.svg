<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="rogueoak">
  <defs>
    <linearGradient id="av-spark" gradientUnits="userSpaceOnUse" x1="120" y1="390" x2="390" y2="120">
      <stop offset="0"    stop-color="#d2a463"/>
      <stop offset="0.55" stop-color="#9bbf72"/>
      <stop offset="1"    stop-color="#5fb98a"/>
    </linearGradient>
    <radialGradient id="av-bg" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0"   stop-color="#1a2533"/>
      <stop offset="1"   stop-color="#0a0d13"/>
    </radialGradient>
    <radialGradient id="av-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#5fb98a" stop-opacity="0.22"/>
      <stop offset="1"   stop-color="#5fb98a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background (GitHub crops to a circle/rounded square) -->
  <rect width="512" height="512" fill="url(#av-bg)"/>
  <circle cx="256" cy="252" r="200" fill="url(#av-glow)"/>

  <!-- oak as a branching node-graph -->
  <g stroke-linecap="round" fill="none" stroke="url(#av-spark)">
    <!-- glow pass -->
    <g stroke-width="18" opacity="0.16">
      <path d="M256 384 L256 296"/>
      <path d="M256 296 L176 224"/> <path d="M256 296 L336 224"/> <path d="M256 296 L256 168"/>
      <path d="M176 224 L128 150"/> <path d="M176 224 L208 158"/>
      <path d="M336 224 L384 150"/> <path d="M336 224 L304 158"/>
      <path d="M256 168 L220 122"/> <path d="M256 168 L292 122"/>
    </g>
    <!-- crisp pass -->
    <g stroke-width="7">
      <path d="M256 384 L256 296"/>
      <path d="M256 296 L176 224"/> <path d="M256 296 L336 224"/> <path d="M256 296 L256 168"/>
      <path d="M176 224 L128 150"/> <path d="M176 224 L208 158"/>
      <path d="M336 224 L384 150"/> <path d="M336 224 L304 158"/>
      <path d="M256 168 L220 122"/> <path d="M256 168 L292 122"/>
    </g>
  </g>

  <!-- nodes -->
  <g>
    <g fill="#5fb98a" opacity="0.18">
      <circle cx="128" cy="150" r="15"/> <circle cx="208" cy="158" r="15"/>
      <circle cx="384" cy="150" r="15"/> <circle cx="304" cy="158" r="15"/>
      <circle cx="220" cy="122" r="15"/> <circle cx="292" cy="122" r="15"/>
      <circle cx="256" cy="384" r="17"/>
    </g>
    <g fill="#eaf1f4">
      <circle cx="128" cy="150" r="8"/> <circle cx="208" cy="158" r="8"/>
      <circle cx="384" cy="150" r="8"/> <circle cx="304" cy="158" r="8"/>
      <circle cx="220" cy="122" r="8"/> <circle cx="292" cy="122" r="8"/>
    </g>
    <g fill="#c9d2da">
      <circle cx="256" cy="296" r="7"/> <circle cx="176" cy="224" r="7"/>
      <circle cx="336" cy="224" r="7"/> <circle cx="256" cy="168" r="7"/>
    </g>
    <circle cx="256" cy="384" r="10" fill="#d2a463"/>
  </g>
</svg>
