# Local convenience: build and run the production image the same way the deploy
# host will. Not used in CI or on the droplet (0005 has its own compose files).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # SITE_URL is baked at build time (see Dockerfile), so pass it as a build
      # arg, not a runtime env, or the pre-rendered metadata would ignore it.
      args:
        SITE_URL: https://rogueoak.com
    image: rogueoak-site
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
