# Release pipeline for rogueoak.com.
# Push to main -> verify (lint/build/test) -> build + push the container image to
# GHCR. A red verify or build never publishes. Deploying the published image to
# the droplet is a separate concern (spec 0005).
#
# Actions are pinned to commit SHAs (mutable tags are a supply-chain risk: the
# build job has packages: write). Dependabot (.github/dependabot.yml) proposes
# SHA bumps with the tag in a trailing comment.
name: release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Default to read-only; the build job opts into packages: write for itself only.
permissions:
  contents: read

# Never build+push two images for the same branch at once; let an in-flight one
# finish so tags are not clobbered mid-run.
concurrency:
  group: release-main
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Same gate the PR runs (ci.yml), shared so the two can never drift apart.
  verify:
    uses: ./.github/workflows/verify.yml

  build:
    needs: verify
    runs-on: ubuntu-latest # native amd64, so no QEMU emulation for the image build
    permissions:
      contents: read
      packages: write # least privilege: only this job pushes to GHCR
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          # SITE_URL is baked into the site's metadata at build time (spec 0003),
          # so it must be passed here, not at deploy time.
          build-args: |
            SITE_URL=https://rogueoak.com
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No cross-run build cache: a stale COPY . . layer can ship old source.
          # A clean build each run is the reliable default; the app builds fast.
          no-cache: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Bound the SSH deploy so a wedged host (e.g. an OOM-thrashed box mid-rollout -
    # matthewmaynes feedback 0015) fails the deploy fast instead of hanging for many
    # minutes. A normal deploy is ~2-3 min; this leaves ample margin for a slow pull.
    timeout-minutes: 12
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          # Pin the exact image built in this run (full-SHA tag from metadata-action),
          # so the running version is auditable and rollback is a one-line tag change.
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key (DEPLOY_KNOWN_HOSTS secret): authenticates the server,
          # so a MITM on a deploy cannot impersonate it. No trust-on-first-use.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=10 \
            "$USER@$HOST" "IMAGE_TAG='$IMAGE_TAG' bash -se" <<'REMOTE'
            set -euo pipefail
            REPO="$HOME/rogueoak"
            # Self-bootstrap: clone on first deploy, else force-sync to origin/main
            # so a stray local edit on the server can never wedge future deploys.
            if [ ! -d "$REPO/.git" ]; then
              git clone https://github.com/rogueoak/rogueoak.git "$REPO"
            fi
            cd "$REPO"
            git fetch --prune origin
            git reset --hard origin/main
            # Cohosted with matthewmaynes.com: that repo owns the shared edge TLS
            # proxy and routes rogueoak.com -> rogueoak:3000, so this deploy no
            # longer brings up Caddy (doing so would swap the proxy config and take
            # the cohosted site offline). Only ensure the shared network exists, an
            # idempotent bootstrap in case this stack deploys before the proxy.
            docker network inspect edge >/dev/null 2>&1 || docker network create edge
            export IMAGE_TAG
            # Pre-pull so the rollout's new container starts instantly (no pull mid-swap).
            docker compose -f deploy/docker/compose.site.yml pull

            # Zero-downtime deploy (spec 0006, symmetric with matthewmaynes spec 0019)
            # via docker-rollout: scale the rogueoak service to two instances, wait for
            # the new one's HEALTHCHECK, then remove the old - so Caddy (dynamic-A
            # upstreams re-resolving the `rogueoak` alias, owned by the matthewmaynes
            # proxy) always has a live backend. The plugin is a host-run shell script,
            # so it is pinned to a commit SHA and checksum-verified before use, like the
            # SHA-pinned Actions (supply chain).
            # docker-rollout v0.13: github.com/Wowu/docker-rollout/releases/tag/v0.13
            ROLLOUT_SHA=39b8066d56cc1edc76d1ae898db46623cc93bc24
            ROLLOUT_SHA256=fa0df004de84747142cb627c55210aaa914bbae76666e7b95a2ac46805d81a84
            plugin="$HOME/.docker/cli-plugins/docker-rollout"
            if ! printf '%s  %s\n' "$ROLLOUT_SHA256" "$plugin" | sha256sum -c - >/dev/null 2>&1; then
              mkdir -p "$HOME/.docker/cli-plugins"
              tmp=$(mktemp)
              trap 'rm -f "$tmp"' EXIT
              curl -fsSL --proto '=https' --tlsv1.2 --max-time 30 \
                "https://raw.githubusercontent.com/Wowu/docker-rollout/$ROLLOUT_SHA/docker-rollout" -o "$tmp"
              printf '%s  %s\n' "$ROLLOUT_SHA256" "$tmp" | sha256sum -c -
              chmod +x "$tmp"
              mv "$tmp" "$plugin"
              trap - EXIT
            fi

            # Roll out the new version with no downtime. docker-rollout scales the
            # `rogueoak` service to two Compose-indexed instances, waits up to 90s for
            # the new one's HEALTHCHECK (image start-period 15s), holds a short grace so
            # Caddy's 1s DNS refresh sees the new IP, then removes the old. Fail-safe: a
            # broken (pullable but unhealthy) image never goes healthy, so rollout tears
            # the new instance down and exits non-zero while the old one keeps serving -
            # a bad build cannot take the site down. This also performs the ONE-TIME
            # cutover from the pre-0006 legacy `rogueoak` container: rollout adds an
            # indexed instance alongside it and only removes the legacy one once the new
            # is healthy, so the cutover is itself zero-downtime.
            docker rollout -t 90 --wait-after-healthy 5 -f deploy/docker/compose.site.yml rogueoak

            # Gate on the FULL public path, not just the container's internal
            # HEALTHCHECK: a Caddy/dynamic-upstream misconfig can leave the container
            # healthy while every visitor gets a 502. Hit the site through Caddy over
            # loopback (--resolve, so it does not depend on DNS/hairpin) and fail the
            # deploy if it is not reachable end-to-end. Caddy is owned by matthewmaynes
            # but runs on this same host on 443.
            ok=""
            for _ in $(seq 1 10); do
              if curl -fsS --max-time 10 --resolve rogueoak.com:443:127.0.0.1 \
                  -o /dev/null https://rogueoak.com; then ok=1; break; fi
              sleep 2
            done
            [ -n "$ok" ] || { echo "post-rollout health check failed: rogueoak.com is not reachable end-to-end"; exit 1; }

            # Prune this project's UNUSED images (label-scoped, -a not just dangling),
            # so superseded sha-<commit> images do not pile up on the host disk; the
            # running image is in use and kept. A cohosted stack's images are untouched.
            docker image prune -af \
              --filter "label=org.opencontainers.image.source=https://github.com/rogueoak/rogueoak"
          REMOTE
